# Any value can be overridden with an APP_ environment variable, a double
# underscore separates nesting levels: APP_HTTP__ADDRESS=:8080
# Set APP_CONFIG to load the config file from a different path.
app:
  name: "go-web-app"
  # 32-byte secret behind cookie encryption and the crypter, generate yours:
  #   openssl rand -base64 24 | head -c 32
  key: "a-long-string-with-32-characters"
  # validator messages: zh_Hans | zh_Hant | ja | ko | es | ru, default English
  locale: "en"
http:
  debug: true
  address: ":3000"
  # serves pprof/expvar on a private port when set, e.g. "127.0.0.1:6060"
  debug_address: ""
  # origins allowed for CORS; empty list = same-origin only
  cors_origins: []
  # serve OpenAPI document and UI at /openapi.json and /docs
  docs: true
  body_limit: 4096 # KB, 0 = 4096
  header_limit: 4096 # bytes
  read_timeout: "10s"
  write_timeout: "10s"
  idle_timeout: "60s"
  reduce_memory_usage: false
log:
  level: "debug" # debug | info | warn | error
  output: "both" # file | stdout | both
  path: "storage/logs/app.log"
database:
  debug: true
  path: "storage/database.db"
  # pool knobs matter once you swap in MySQL/PostgreSQL; 0 = driver default
  max_open_conns: 0
  max_idle_conns: 0
  conn_max_lifetime: "0s"
