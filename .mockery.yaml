template: testify
# one mock package per module, so same-named interfaces cannot collide
dir: mocks/{{.InterfaceDirRelative | trimPrefix "internal/"}}
structname: "{{.InterfaceName}}"
pkgname: "{{.SrcPackageName}}"
filename: "{{.InterfaceName}}.go"
packages:
  github.com/libtnb/fiber-skeleton/internal:
    config:
      recursive: true
      all: true
      exclude-subpkg-regex:
        - "/pkg(/|$)"
        - "/data$"
        - "/service$"
        - "/server$"
        - "/bootstrap$"
        - "/conf$"
        - "/app$"
